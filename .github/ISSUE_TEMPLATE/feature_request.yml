name: Feature request
description: Propose a new tool, capability, or skill improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem, description: What are you trying to do that's hard today? }
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes: { label: Proposal, description: New tool/flag/skill step. Note read-only vs destructive. }
    validations: { required: true }
